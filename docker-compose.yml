services:
  # --- API Version 1 ---
  api-v1:
    build:
      context: .
      dockerfile: src/api/v1/Dockerfile
    # Objectif 2 : Haute disponibilité avec 3 répliques
    deploy:
      replicas: 3
    # On expose le port 8000 en interne (accessible par Nginx uniquement)
    expose:
      - "8000"
    restart: always

  # --- API Version 2 (Debug / A/B Testing) ---
  api-v2:
    build:
      context: .
      dockerfile: src/api/v2/Dockerfile
    expose:
      - "8000"
    restart: always

  # --- Reverse Proxy Nginx (Point d'entrée unique) ---
  nginx:
    build:
      context: ./deployments/nginx
    container_name: nginx_proxy
    # Objectif 1 & 3 : Seul point d'entrée via HTTP (80) et HTTPS (443)
    ports:
      - "80:80"
      - "443:443"
    # S'assure que les APIs sont prêtes avant de lancer le proxy
    depends_on:
      - api-v1
      - api-v2
    restart: always

  # --- Monitoring : Prometheus (Objectif 7 - Bonus) ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_server
    ports:
      - "9090:9090"
    volumes:
      - ./deployments/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - nginx

  # --- Monitoring : Grafana (Objectif 7 - Bonus) ---
  grafana:
    image: grafana/grafana:latest
    container_name: grafana_dashboard
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus

# Persistance des données pour le monitoring
volumes:
  prometheus_data:
  grafana_data: