# Configuration globale
events {
    # Nombre maximal de connexions simultanées par worker
    worker_connections 1024;
}

http {
    # --- 1. CONFIGURATION DU RATE LIMITING ---
    # On crée une zone mémoire "predict_limit" de 10 Mo pour stocker les adresses IP.
    # On limite chaque IP à 10 requêtes par seconde (10r/s).
    limit_req_zone $binary_remote_addr zone=predict_limit:10m rate=10r/s;

    # --- 2. DÉFINITION DES BACKENDS ---
    # Groupe de serveurs pour la V1 (Docker gère l'équilibrage entre les 3 répliques)
    upstream api_v1_servers {
        server api-v1:8000;
    }

    # Groupe de serveurs pour la V2 (Debug/A-B Testing)
    upstream api_v2_servers {
        server api-v2:8000;
    }

    # --- 3. SERVEUR HTTP : REDIRECTION ---
    server {
        listen 80;
        server_name localhost; # Nom de domaine ou IP que ce bloc serveur gère

        # Redirige tout le trafic HTTP vers HTTPS avec un code 301 (Permanent)
        return 301 https://$host$request_uri;
    }

    # --- 4. SERVEUR HTTPS : CŒUR DE L'ARCHITECTURE ---
    server {
        listen 443 ssl;         # Ecoute sur le port 443 et active SSL
        server_name localhost;  # Nom de domaine ou IP que ce bloc serveur gère

        # Chemins vers les certificats générés par le Dockerfile
        ssl_certificate /etc/nginx/certs/nginx.crt;
        ssl_certificate_key /etc/nginx/certs/nginx.key;

        # --- CONFIGURATION DU POINT DE TERMINAISON /predict ---
        location /predict {
            # AUTHENTIFICATION
            # Demande un login/password basé sur le fichier .htpasswd
            auth_basic "Zone Protégée - MLOps";
            auth_basic_user_file /etc/nginx/.htpasswd;

            # RATE LIMITING
            # Applique la limite définie plus haut. 
            # burst=5 autorise une petite flexibilité si les requêtes arrivent en même temps.
            limit_req zone=predict_limit burst=5 nodelay;

            # LOGIQUE A/B TESTING
            # Par défaut, on envoie vers la V1
            set $target_backend "api_v1_servers";
            
            # Si l'en-tête "X-Experiment-Group" est présent et vaut "debug"
            if ($http_x_experiment_group = "debug") {
                set $target_backend "api_v2_servers";
            }

            # ENVOI DE LA REQUÊTE AU BACKEND
            proxy_pass http://$target_backend;
            
            # Transmission des informations réelles du client au backend (IP, Host, etc.)
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # --- 5. MONITORING STATUS ---
        # Permet à Prometheus de lire les statistiques basiques de Nginx
        location /metrics {
            stub_status on;
            access_log off;
            # Dans un cas réel, on restreindrait l'accès ici (allow 127.0.0.1; deny all;)
        }
    }
}